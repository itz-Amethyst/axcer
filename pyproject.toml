[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.poetry]
name = "axcer"
version = "0.0.1"
description = "another extraction and Contextual Evaluation Resource"
authors = ["Milad-Khormaee <pransermi@gmail.com>"]

license = "MIT"
readme = "README.md"
include = [""]

classifiers = [
  "Intended Audience :: Developers",
  "Topic :: Text Processing",
  "Natural Language :: Persian",
]

# homepage = ""
# repository = ""
# documentation = ""
keywords = ["nlp", "persian"]

[tool.poetry.urls]
"Demo" = ""
"Changelog" = "https://github.com/"
"Contribution" = "https://github.com/"
"Issues" = "https://github.com/"

[tool.poetry.dependencies]
python = "^3.12"
rake-nltk = "^1.0.6"


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.3"
python-semantic-release = "^9.11.1"
pyinstrument = "^5.0.0"
pytest-sugar = "^1.0.0"
ruff = "^0.7.0"
tox = "^4.23.0"
setuptools = "^75.2.0"

# [build-system]
# requires = ["poetry-core"]
# build-backend = "poetry.core.masonry.api"
pytest-cov = "^5.0.0"
coverage = "^7.6.3"

[tool.setuptools.packages.find]
exclude = ["test*"]

[tool.bandit]
targets = ["./axcer"]
exclude_dirs = ["tests"]
severity = "medium"
confidence = "medium"
progress = true
include = ["B101", "B102"]
exclude_tests = ["B301", "B302"]


[tool.ruff]
# Exclude common directories that are typically not part of the source code or are generated by tools.
exclude = [
  ".bzr",
  ".env",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  "__pycache__",
  ".pytest_cache",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "venv",
  "tests",
  "business-facing/layer", #OKAPI Layer
]

# Set the maximum line length to 127 characters.
line-length = 127

# Define the number of spaces used for indentation, aligning with Black's style.
indent-width = 4

# The minimum Python version to target, e.g., when considering automatic code upgrades, 
# like rewriting type annotations
target-version = "py38"

[tool.ruff.lint]
# Defined rules
select = [
  "F",   # Pyflakes: Syntax errors, undefined variables.
  "E4",  # Pycodestyle: Whitespace around operators, comments.
  "E7",  # Pycodestyle: Indentation and continuation line issues.
  "E9",  # Pycodestyle: Syntax errors and serious issues.
  "W",   # Pycodestyle Warnings: General coding style warnings.
  "I",   # Import Sorting: Enforces import order.
  "B",   # Bugbear: Warns about potential bugs, best practices.
  "SIM", # Simplify: Suggests simpler, Pythonic alternatives.
  "ANN", # Annotations: Checks missing or incorrect type hints.
  "ARG", # Arguments: Flags unused or excessive function arguments.
  "UP",  # Unused variables: Warnings about variables that are declared but not used
  "YTT", # Type annotations: Issues with type annotations in functions and variables
  "PGH", # Performance: Performance issues related to function calls
  "PL",  # Performance: General performance issues
  "PLC", # Performance: Performance issues related to class methods
  "PLE", # Performance: Performance issues related to loops
  "PLR", # Performance: Performance issues related to recursion
  "PLW", # Performance: Performance issues related to while loops
  "TRY", # Try/Except: Best practices for using try/except blocks
]
ignore = [
  "RUF001", # String contains ambiguous unicode character
  "RUF002", # Docstring contains ambiguous unicode character
  "RUF003", # Comment contains ambiguous unicode character
  "TRY002", # Create your own exception
  "D100",   # Missing docstring in public module	
  "D101",   # Missing docstring in public class	
  "D102",   # Missing docstring in public method	
  "D103",   # Missing docstring in public function	
  "D104",   # Missing docstring in public package	
  "D105",   # Missing docstring in magic method	
  "D106",   # Missing docstring in public nested class	
  "D107",   # Missing docstring in __init__
]

# Allow auto-fixing of all enabled rules when using the `--fix` option.
fixable = ["ALL"]
unfixable = []    # Specify rules that cannot be auto-fixed, if any.

# Define a regex pattern for allowed unused variables (typically underscore-prefixed).
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
ignore-init-module-imports = true
namespace-packages = ["ascer"]
show-fixes = true

[tool.ruff.format]
# Enforce double quotes for strings, following Black's style.
quote-style = "double"

# Use spaces for indentation, in line with Black's formatting style.
indent-style = "space"

# Keep magic trailing commas, a feature of Black's formatting.
skip-magic-trailing-comma = false

# Automatically detect and use the appropriate line ending style.
line-ending = "auto"

[tool.ruff.pydocstyle]
convention = "google"

[tool.ruff.per-file-ignores]
"mkdocs_macros.py" = ["ALL"] # always

[tool.semantic_release]
version_variable = "axcer/__init__.py" # Path to the version variable in your code
version = "0.0.1"                      # Starting version
disable_commit_message_check = false   # Ensure that commit messages follow semantic versioning
changelog_file = "CHANGELOG.md"        # Path to the changelog file

[tool.semantic_release.commit_parser_options]
allowed_tags = [
  "build",
  "chore",
  "docs",
  "feat",
  "fix",
  "perf",
  "refactor",
  "ci",
  "test",
  "config"
]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
